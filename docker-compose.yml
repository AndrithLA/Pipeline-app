version: '3.8'
services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-pipeline  # <--- Cambia el nombre aquí
    privileged: true
    user: root
    ports:
      - "8083:8080"
      - "50002:50000"
    volumes:
      - jenkins_home_pipeline:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home_pipeline: